<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Evano Studio">
  <defs>
    <linearGradient id="ev" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF8A3D" />
      <stop offset="0.5" stop-color="#FF4D6D" />
      <stop offset="1" stop-color="#FF2D78" />
    </linearGradient>
  </defs>

  <!-- three crossing orbits (atom) -->
  <g fill="none" stroke="url(#ev)" stroke-width="19" stroke-linecap="round">
    <ellipse cx="256" cy="256" rx="208" ry="84" transform="rotate(0 256 256)" />
    <ellipse cx="256" cy="256" rx="208" ry="84" transform="rotate(60 256 256)" />
    <ellipse cx="256" cy="256" rx="208" ry="84" transform="rotate(120 256 256)" />
  </g>

  <!-- orbit nodes -->
  <g fill="url(#ev)">
    <circle cx="256" cy="50" r="31" />
    <circle cx="78" cy="359" r="27" />
    <circle cx="434" cy="359" r="27" />
  </g>

  <!-- center hexagon (flat-top) with a lighter inner hex -->
  <polygon points="318,256 287,309.7 225,309.7 194,256 225,202.3 287,202.3" fill="url(#ev)" />
  <polygon points="288,256 272,283.7 240,283.7 224,256 240,228.3 272,228.3" fill="#ffffff" fill-opacity="0.28" />
</svg>
